<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dad's Packing List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1923;
      font-family: Georgia, 'Times New Roman', serif;
      color: #e8dcc8;
    }

    /* ── HEADER ── */
    #header {
      background: linear-gradient(135deg, #0a3d5c 0%, #0f1923 60%);
      border-bottom: 1px solid #1e3a52;
      padding: 32px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    #header::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(14,165,233,.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(20,184,166,.06) 0%, transparent 50%);
    }
    #header > * { position: relative; z-index: 1; }

    .header-sub  { font-size: 13px; letter-spacing: .2em; color: #0ea5e9; text-transform: uppercase; margin-bottom: 8px; }
    .header-title { font-size: clamp(22px,5vw,36px); font-weight: 400; letter-spacing: .05em; color: #f0e8d8; margin-bottom: 4px; }
    .header-loc  { font-size: 13px; color: #7aa8c0; margin-bottom: 20px; }

    /* progress bar */
    #progress-wrap { max-width: 340px; margin: 0 auto; }
    #progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: #7aa8c0; margin-bottom: 6px; }
    #progress-track { background: #1e3a52; border-radius: 99px; height: 6px; overflow: hidden; }
    #progress-fill  { height: 100%; width: 0%; background: linear-gradient(90deg,#0ea5e9,#14b8a6); border-radius: 99px; transition: width .4s ease; }

    /* ── FILTER PILLS ── */
    #pills {
      padding: 16px 16px 0;
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .pill {
      padding: 6px 14px; border-radius: 99px; border: 1px solid #1e3a52;
      background: transparent; color: #7aa8c0; font-size: 12px;
      cursor: pointer; letter-spacing: .05em; transition: all .2s;
      font-family: Georgia, serif; display: inline-flex; align-items: center; gap: 5px;
    }
    .pill.active-all  { border-color: #0ea5e9; background: rgba(14,165,233,.15); color: #0ea5e9; }
    .pill .pill-badge {
      border-radius: 99px; padding: 0 6px; font-size: 10px;
      font-family: monospace; font-weight: 700; color: #0f1923;
    }

    /* ── GRID ── */
    #grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #131f2b;
      border: 1px solid #1e3a52;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .3s;
    }
    .card.done { /* border-color set inline via JS */ }

    .card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1a2e40;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header-left { display: flex; align-items: center; gap: 10px; }
    .card-icon  { font-size: 20px; }
    .card-label { font-size: 14px; font-weight: 400; letter-spacing: .05em; color: #e8dcc8; }
    .card-count { font-size: 11px; margin-top: 1px; }
    .card-done-badge {
      font-size: 11px; border-radius: 99px; padding: 2px 10px;
      letter-spacing: .1em; border: 1px solid; display: none;
    }

    .card-progress { height: 2px; background: #1e3a52; }
    .card-progress-fill { height: 100%; width: 0%; transition: width .3s ease; }

    .card-items { padding: 8px 4px; }

    .item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 12px; cursor: pointer; border-radius: 6px;
      margin: 1px 4px; transition: background .15s;
    }
    .item:hover { background: #1a2e40; }
    .item.checked { /* background set inline */ }

    .checkbox {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid #2d4a60; background: transparent;
      flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-size: 10px; color: #0f1923; font-weight: bold;
    }

    .item-label {
      font-size: 13px; line-height: 1.5; color: #c8bca8; transition: all .2s;
    }
    .item.checked .item-label { color: #4a7a8a; text-decoration: line-through; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 24px; font-size: 12px; color: #2d4a60; letter-spacing: .1em; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     PACKING DATA — edit your items right here!
     
     Each category has:
       id     — unique slug (no spaces)
       label  — display name
       icon   — any emoji
       color  — hex color for that section
       items  — list of things to pack (one per line,
                each wrapped in quotes, comma-separated)
════════════════════════════════════════════════ -->

<!-- ═══ PAGE STRUCTURE (no need to edit below here) ═══ -->

<div id="header">
  <div class="header-sub">Yucatán Peninsula · Mexico</div>
  <h1 class="header-title">Dad's Packing List</h1>
  <div class="header-loc">Ascension Bay · Cancún · Akumal · Chichen Itza</div>
  <div id="progress-wrap">
    <div id="progress-labels">
      <span id="prog-text">0 of 0 items packed</span>
      <span id="prog-pct">0%</span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
</div>

<div id="pills"></div>
<div id="grid"></div>
<footer>BUEN VIAJE · TIGHT LINES</footer>

<script>
  const checked = {};
  let activeCategory = null;

  const totalItems = categories.reduce((s, c) => s + c.items.length, 0);

  function countChecked() {
    return Object.values(checked).filter(Boolean).length;
  }

  function updateProgress() {
    const n = countChecked();
    const pct = Math.round((n / totalItems) * 100);
    document.getElementById('prog-text').textContent = `${n} of ${totalItems} items packed`;
    document.getElementById('prog-pct').textContent = `${pct}%`;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function renderPills() {
    const container = document.getElementById('pills');
    container.innerHTML = '';

    const all = document.createElement('button');
    all.className = 'pill' + (activeCategory === null ? ' active-all' : '');
    all.textContent = 'All Categories';
    all.onclick = () => { activeCategory = null; renderPills(); renderGrid(); };
    container.appendChild(all);

    categories.forEach(cat => {
      const catChecked = cat.items.filter(i => checked[cat.id + '::' + i]).length;
      const isActive = activeCategory === cat.id;

      const btn = document.createElement('button');
      btn.className = 'pill';
      btn.style.borderColor = isActive ? cat.color : '#1e3a52';
      btn.style.background  = isActive ? cat.color + '22' : 'transparent';
      btn.style.color       = isActive ? cat.color : '#7aa8c0';

      const iconSpan  = document.createElement('span'); iconSpan.textContent = cat.icon;
      const labelSpan = document.createElement('span'); labelSpan.textContent = cat.label;
      btn.appendChild(iconSpan);
      btn.appendChild(labelSpan);

      if (catChecked > 0) {
        const badge = document.createElement('span');
        badge.className = 'pill-badge';
        badge.style.background = cat.color;
        badge.textContent = catChecked + '/' + cat.items.length;
        btn.appendChild(badge);
      }

      btn.onclick = () => {
        activeCategory = isActive ? null : cat.id;
        renderPills(); renderGrid();
      };
      container.appendChild(btn);
    });
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const toShow = activeCategory
      ? categories.filter(c => c.id === activeCategory)
      : categories;

    toShow.forEach(cat => {
      const catChecked = cat.items.filter(i => checked[cat.id + '::' + i]).length;
      const allDone = catChecked === cat.items.length;

      const card = document.createElement('div');
      card.className = 'card' + (allDone ? ' done' : '');
      card.style.borderColor = allDone ? cat.color + '55' : '#1e3a52';

      // header
      const hdr = document.createElement('div');
      hdr.className = 'card-header';
      hdr.style.background = `linear-gradient(135deg, ${cat.color}11 0%, transparent 70%)`;

      const left = document.createElement('div');
      left.className = 'card-header-left';
      const iconEl = document.createElement('span');
      iconEl.className = 'card-icon'; iconEl.textContent = cat.icon;
      const info = document.createElement('div');
      const lbl = document.createElement('div');
      lbl.className = 'card-label'; lbl.textContent = cat.label;
      const cnt = document.createElement('div');
      cnt.className = 'card-count'; cnt.style.color = cat.color;
      cnt.textContent = catChecked + '/' + cat.items.length + ' packed';
      info.appendChild(lbl); info.appendChild(cnt);
      left.appendChild(iconEl); left.appendChild(info);

      const doneBadge = document.createElement('span');
      doneBadge.className = 'card-done-badge';
      doneBadge.style.background = cat.color + '22';
      doneBadge.style.color = cat.color;
      doneBadge.style.borderColor = cat.color + '55';
      doneBadge.textContent = '✓ DONE';
      if (allDone) doneBadge.style.display = 'inline-block';

      hdr.appendChild(left); hdr.appendChild(doneBadge);
      card.appendChild(hdr);

      // mini progress bar
      const pbar = document.createElement('div'); pbar.className = 'card-progress';
      const pfill = document.createElement('div'); pfill.className = 'card-progress-fill';
      pfill.style.width = ((catChecked / cat.items.length) * 100) + '%';
      pfill.style.background = cat.color;
      pbar.appendChild(pfill); card.appendChild(pbar);

      // items
      const itemsWrap = document.createElement('div'); itemsWrap.className = 'card-items';
      cat.items.forEach(itemText => {
        const key = cat.id + '::' + itemText;
        const isChecked = !!checked[key];

        const row = document.createElement('div');
        row.className = 'item' + (isChecked ? ' checked' : '');
        if (isChecked) row.style.background = cat.color + '0d';

        const box = document.createElement('div');
        box.className = 'checkbox';
        box.style.borderColor = isChecked ? cat.color : '#2d4a60';
        box.style.background  = isChecked ? cat.color : 'transparent';
        box.textContent = isChecked ? '✓' : '';

        const span = document.createElement('span');
        span.className = 'item-label'; span.textContent = itemText;

        row.appendChild(box); row.appendChild(span);

        row.addEventListener('mouseenter', () => {
          if (!checked[key]) row.style.background = '#1a2e40';
        });
        row.addEventListener('mouseleave', () => {
          row.style.background = checked[key] ? cat.color + '0d' : 'transparent';
        });

        row.onclick = () => {
          checked[key] = !checked[key];
          renderPills();
          renderGrid();
          updateProgress();
        };

        itemsWrap.appendChild(row);
      });
      card.appendChild(itemsWrap);
      grid.appendChild(card);
    });
  }

  // Init
  renderPills();
  renderGrid();
  updateProgress();
</script>
</body>
</html>
